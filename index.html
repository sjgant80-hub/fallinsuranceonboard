  const KCC_MINT_URL = 'https://sjgant80-hub.github.io/kcc-mint/';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

  // ─── Toast ───────────────────────────────────────────────────────
  function notify(msg, kind) {
    let t = $('#fk-toast');
    if (!t) {
      t = document.createElement('div'); t.id = 'fk-toast';
      t.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:#c08a3a;color:#0a0a0a;padding:9px 18px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:10000;pointer-events:none';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2400);
  }

          </select>

async function sha256(s){const buf=s instanceof ArrayBuffer?s:new TextEncoder().encode(typeof s==='string'?s:JSON.stringify(s));const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

 });
}
function idbPut(store,val,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const r=key?tx.objectStore(store).put(val,key):tx.objectStore(store).put(val);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}

async function appendAudit(action, info){
 if(!state.settings.auditChain)return;
 if(!db)await openDB();
 const i=state.audit.length?state.audit[state.audit.length-1].i+1:1;
 const prevHash=state.audit.length?state.audit[state.audit.length-1].docHash:'';
 const payload=info.payload||{};
 const entry={
 i,
 ts:Date.now(),
 tool:TOOLNAME,
 adviserId:info.adviserId||'',
 clientId:info.clientId||'',
 action,
 reasoning:info.reasoning||'',
 configVersion:`${TOOLNAME}@${VERSION}`,
 prevHash,
 docHash:'',
 payload
 };
 entry.docHash=await sha256(JSON.stringify({prevHash,ts:entry.ts,action,clientId:entry.clientId,payload}));
 state.audit.push(entry);
 if(state.audit.length>AUDIT_CAP){
 const drop=state.audit.length-AUDIT_CAP;
 for(let k=0;k<drop;k++){await idbDel('audit',state.audit[k].i)}
 state.audit=state.audit.slice(drop);
 }
 await idbPut('audit',entry);
}

// BROADCAST MESH · fall-insurance + fall-signal
// ════════════════════════════════════════════════════════════════
let bcIns=null, bcSignal=null;
let _bcDebounce={};
function bcInit(){

 }catch(e){console.warn('BroadcastChannel unavailable',e)}
}
function bcSend(type,payload){
 if(!bcIns)return;
 const key=type+'|'+(payload?.id||'');
 clearTimeout(_bcDebounce[key]);
 _bcDebounce[key]=setTimeout(()=>{
 try{bcIns.postMessage({v:1,type,ts:now(),source:TOOLNAME,payload})}catch(e){}
 },300);
}
function bcSendNow(type,payload){
 if(!bcIns)return;
 try{bcIns.postMessage({v:1,type,ts:now(),source:TOOLNAME,payload})}catch(e){}
}
async function handleInsMsg(e){
 const m=e.data;if(!m||m.source===TOOLNAME)return;
 switch(m.type){
 case 'sync.request':{
 bcSendNow('sync.snapshot',{clients:state.clients,advisers:state.advisers,firm:state.firm});
 break;
 }
 case 'sync.snapshot':{
 mergeSnapshot(m.payload||{});render();break;
 }
 case 'client.created':
 case 'client.updated':
 case 'client.archived':{
 mergeRecord('clients',m.payload);render();break;
 }
 case 'adviser.created':
 case 'adviser.updated':
 case 'adviser.archived':{
 mergeRecord('advisers',m.payload);render();break;
 }
 case 'firm.updated':{
 if(!state.firm||(m.payload?.updatedAt||0)>(state.firm?.updatedAt||0)){state.firm=m.payload;persistState();render()}
 break;
 }
 case 'policy.created':
 case 'policy.updated':
 case 'policy.renewed':
 case 'policy.lapsed':
 case 'policy.claimed':{
 mergeRecord('policies',m.payload);render();break;
 }
 }

function handleSignalMsg(e){
 const m=e.data;if(!m||m.source===TOOLNAME)return;
 if(m.type==='ping'&&bcSignal)bcSignal.postMessage({source:TOOLNAME,type:'pong',prime:PRIME,version:VERSION,ts:now()});

function mergeRecord(coll,rec){
 if(!rec||!rec.id)return;
 const arr=state[coll]||[];const i=arr.findIndex(x=>x.id===rec.id);

}
function mergeSnapshot(p){

 if(Array.isArray(p.advisers))p.advisers.forEach(a=>mergeRecord('advisers',a));

}

// ════════════════════════════════════════════════════════════════
// AML RISK SCORING + AML TRIGGER LOGIC (insurance broker)
// ════════════════════════════════════════════════════════════════
function suggestRiskGrade(c){
 const k=c.kyc||{};let score=0;const reasons=[];
 if(k.pepFlag){score+=3;reasons.push('PEP flagged (+3)')}
 if(k.sanctionsStatus==='match'){score+=4;reasons.push('Sanctions match (+4)')}
 if(k.sanctionsStatus==='review'){score+=2;reasons.push('Sanctions review (+2)')}
 if(k.sanctionsStatus==='not-checked'){score+=1;reasons.push('Sanctions not checked (+1)')}
 if(k.vulnerableCustomerFlag){score+=1;reasons.push('Vulnerable customer (+1)')}
 if(HIGH_RISK_JURIS.includes(c.nationality)){score+=3;reasons.push('Nationality high-risk (+3)')}
 if(HIGH_RISK_JURIS.includes(c.countryOfResidence)){score+=3;reasons.push('Residence high-risk (+3)')}
 if(c.customerCategory==='large-risk'){score+=1;reasons.push('Large-risk customer (+1)')}
 if(c.entityType==='entity'&&!c.companiesHouseNo){score+=1;reasons.push('Entity without Companies House no (+1)')}
 // commercial directors PEP
 if((k.pscDirectors||[]).some(d=>d.pepChecked&&d.sanctionsResult==='match')){score+=4;reasons.push('Director sanctions match (+4)')}
 if((k.pscDirectors||[]).some(d=>d.pep)){score+=2;reasons.push('Director PEP (+2)')}
 if(['gift','business-sale','other'].includes(k.sourceOfFunds)){score+=1;reasons.push('Higher-scrutiny source of funds (+1)')}
 // turnover-based risk for commercial
 if(c.entityType==='entity'&&(c.businessProfile?.turnover||0)>10000000){score+=1;reasons.push('Turnover >£10M (+1)')}
 // industry risk
 const highIndustry=['41200','43999','56101','56210'];
 if(highIndustry.includes(c.industrySIC)){score+=1;reasons.push('Higher-risk industry sector (+1)')}
 const grade=score>=5?'high':(score>=2?'medium':'low');
 return {grade,score,reasons};
}

// AML trigger — JMLSG Part II §16 / MLR 2017 reg.8
function checkAmlTrigger(c){
 if(c.entityType==='entity'){
 // commercial — always do CDD on entities (corp veil + BO discovery)
 return {triggered:true, reason:'Commercial entity — CDD always required to identify beneficial owners (MLR 2017 reg.5(1)(b), reg.28(4))'};
 }
 // individuals — life products with annual premium > £1k or single premium > £2.5k
 const lifeProducts=(c.demandsAndNeeds?.productClasses||[]).filter(p=>['life'].includes(p));
 if(lifeProducts.length>0){
 return {triggered:true, reason:'Life / pure-protection product (MLR 2017 reg.8(2)(b); JMLSG Part II §16 — premium thresholds apply)'};
 }
 // high premium GI commercial
 const tot=(state.policies||[]).filter(p=>p.clientId===c.id&&p.status==='in-force').reduce((a,p)=>a+(p.premium?.gross||0),0);
 if(tot>=AML_PREMIUM_THRESHOLD){
 return {triggered:true, reason:`Aggregate premium ≥£${AML_PREMIUM_THRESHOLD.toLocaleString('en-GB')} — JMLSG higher-scrutiny trigger`};
 }
 if(c.kyc?.pepFlag) return {triggered:true, reason:'PEP — EDD required (MLR 2017 reg.35)'};
 if(HIGH_RISK_JURIS.includes(c.nationality)||HIGH_RISK_JURIS.includes(c.countryOfResidence))
 return {triggered:true, reason:'High-risk jurisdiction — EDD (MLR 2017 reg.33)'};
 return {triggered:false, reason:'Pure GI consumer product — full AML CDD not statutorily triggered; ICOBS conduct still applies'};
}

function computeReviewDates(c){
 const grade=c.kyc?.riskGrade||'low';
 const days=REVIEW_CADENCE[grade]||730;
 const last=c.kyc?.lastReviewAt||c.createdAt||now();
 return {lastReviewAt:last,nextReviewDue:addDays(last,days)};
}

function clientDisplayName(c){
 if(!c)return'(unknown)';
 if(c.entityType==='entity')return c.entityName||'(unnamed entity)';
 return `${c.firstName||''} ${c.lastName||''}`.trim()||'(unnamed)';
}

async function saveClient(c,action,reasoning){
 c.updatedAt=now();
 const i=state.clients.findIndex(x=>x.id===c.id);
 const isNew=i<0;
 if(isNew){state.clients.push(c)}else{state.clients[i]=c}
 await persistState();
 await appendAudit(action||(isNew?'client.created':'client.updated'),{
 clientId:c.id,adviserId:c.adviserId,
 reasoning:reasoning||(isNew?'Onboarding committed':'Client record updated'),
 payload:{id:c.id,name:clientDisplayName(c),category:c.customerCategory,kycStatus:c.kyc?.status,risk:c.kyc?.riskGrade}
 });
 bcSend(isNew?'client.created':'client.updated',c);
 return c;
}

 await appendAudit('client.archived',{clientId:c.id,adviserId:c.adviserId,reasoning:reasoning||'Soft-archived (FCA 6yr retention)',payload:{id:c.id}});

async function storeDocument(file,clientId,type,note){
 const id=uid('dc');
 const hash=await sha256Blob(file);
 const rec={id,clientId,filename:file.name,type,mime:file.type||'',size:file.size,sha256:hash,capturedAt:now(),note:note||'',blob:file};
 await idbPut('documents',rec);
 const expDays=DOC_EXPIRY[type];
 return {id,type,filename:file.name,blobRef:id,sha256:hash,size:file.size,mime:rec.mime,capturedAt:rec.capturedAt,expiresAt:expDays?addDays(rec.capturedAt,expDays):null,verifiedBy:'',note:note||''};
}
async function fetchDocument(id){return idbGet('documents',id)}
async function downloadDocument(id){
 const r=await fetchDocument(id);if(!r){toast('Document not found');return}
 const u=URL.createObjectURL(r.blob);const a=document.createElement('a');a.href=u;a.download=r.filename;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);
}
async function deleteDocument(id){await idbDel('documents',id)}

// ════════════════════════════════════════════════════════════════
// ONBOARDING WIZARD · 10 steps
// ════════════════════════════════════════════════════════════════
const WIZARD_STEPS=[
 {n:1,id:'category',label:'Category'},
 {n:2,id:'identity',label:'Identity'},
 {n:3,id:'contact',label:'Contact'},
 {n:4,id:'business',label:'Business'},
 {n:5,id:'demands',label:'D&N'},
 {n:6,id:'cdd',label:'CDD'},
 {n:7,id:'pep',label:'PEP/SAN'},
 {n:8,id:'vuln',label:'Vulner.'},
 {n:9,id:'docs',label:'Docs'},
 {n:10,id:'commit',label:'Commit'}
];
function newClient(){
 const c=newClientRec();
 state.ui.wizard={clientId:c.id,step:1,client:c,fresh:true};
 renderWizard();
}
function renderWizard(){
 if(!state.ui.wizard)return;
 const w=state.ui.wizard;const c=w.client;
 const isCommercial=c.entityType==='entity'||c.customerCategory==='commercial'||c.customerCategory==='large-risk';
 openModalHTML('wizard',`<h3>${w.fresh?'Onboard new client':'Edit onboarding'} <span class="meta" style="font-family:var(--mono);font-size:10px;color:var(--brass);margin-left:8px">step ${w.step}/10</span></h3>
 <div class="wizard">
 <div class="wizard-steps">${WIZARD_STEPS.map(s=>{
 const skip=s.id==='business'&&!isCommercial;
 return `<div class="wstep ${w.step===s.n?'active':''} ${w.step>s.n?'done':''} ${skip?'skip':''}" onclick="jumpStep(${s.n})"><span class="n">${s.n}</span>${esc(s.label)}</div>`;
 }).join('')}</div>
 <div class="wizard-body">${stepHTML(w.step,c,isCommercial)}</div>
 <div class="wizard-foot">
 <button class="btn ghost" onclick="closeWizard()">cancel</button>
 <div style="display:flex;gap:6px">
 ${w.step>1?'<button class="btn" onclick="prevStep()">← previous</button>':''}
 ${w.step<10?`<button class="btn primary" onclick="nextStep()">next →</button>`:`<button class="btn primary" onclick="commitWizard()">✓ commit + add</button>`}
 </div>
 </div>
 </div>`,{wide:true,noClose:true});
}
function closeWizard(){if(confirm('Discard onboarding progress?')){state.ui.wizard=null;closeModal()}}
function jumpStep(n){if(!state.ui.wizard)return;state.ui.wizard.step=n;renderWizard()}
function prevStep(){if(!state.ui.wizard||state.ui.wizard.step<=1)return;state.ui.wizard.step--;renderWizard()}
function nextStep(){
 if(!state.ui.wizard)return;
 const w=state.ui.wizard;
 const ok=collectStep(w.step,w.client);if(!ok)return;
 // skip business step if not commercial
 if(w.step===3&&w.client.entityType!=='entity'&&w.client.customerCategory==='consumer'){w.step=5}
 else w.step++;
 if(w.step>10)w.step=10;
 renderWizard();
}
function collectStep(step,c){
 const root=$('#modalRoot');
 const F=(name)=>root.querySelector(`[name="${name}"]`);
 const FV=(name)=>F(name)?.value||'';
 const FC=(name)=>F(name)?.checked||false;
 const FA=(name)=>Array.from(root.querySelectorAll(`[name="${name}"]:checked`)).map(x=>x.value);
 switch(step){
 case 1: c.customerCategory=FV('customerCategory')||c.customerCategory; c.entityType=FV('entityType')||c.entityType; if((c.customerCategory==='commercial'||c.customerCategory==='large-risk')&&c.entityType==='individual')c.entityType='entity'; break;
 case 2:
 if(c.entityType==='individual'){
 c.title=FV('title');c.firstName=FV('firstName');c.middleName=FV('middleName');c.lastName=FV('lastName');
 c.dob=FV('dob');c.nationality=FV('nationality')||'GB';c.countryOfResidence=FV('countryOfResidence')||'GB';
 c.nino=FV('nino');c.utr=FV('utr');
 if(!c.firstName||!c.lastName){toast('First and last name required');return false}
 }else{
 c.entityName=FV('entityName');c.tradingName=FV('tradingName');c.companiesHouseNo=FV('companiesHouseNo');
 c.vatNumber=FV('vatNumber');c.industrySIC=FV('industrySIC');c.industry=FV('industry');c.incorporationDate=FV('incorporationDate');
 if(!c.entityName){toast('Entity name required');return false}
 } break;
 case 3:
 c.email=FV('email');c.phone=FV('phone');
 c.address={line1:FV('addr1'),line2:FV('addr2'),city:FV('city'),region:FV('region')||'England',postcode:FV('postcode'),country:FV('country')||'GB',since:FV('addrSince')};
 break;
 case 4:
 if(c.entityType==='entity'){
 c.businessProfile=c.businessProfile||{};
 c.businessProfile.turnover=+FV('turnover')||0;c.businessProfile.headcount=+FV('headcount')||0;
 c.businessProfile.sector=FV('sector');c.businessProfile.priorInsurerHistory=FV('priorInsurerHistory');
 c.businessProfile.priorClaimsCount5y=+FV('priorClaimsCount5y')||0;
 c.businessProfile.priorClaimsTotal5y=+FV('priorClaimsTotal5y')||0;
 c.businessProfile.contractRequirements=FV('contractRequirements');
 } break;
 case 5:
 c.demandsAndNeeds=c.demandsAndNeeds||{};
 c.demandsAndNeeds.productClasses=FA('productClass');
 c.demandsAndNeeds.eventsOfConcern=FV('eventsOfConcern');c.demandsAndNeeds.pastClaims=FV('pastClaims');

function updateCatCards(){
 if(!state.ui.wizard)return;

async function onWizDocPick(e){
 const f=e.target.files[0];if(!f)return;
 const type=$('#wizDocType').value;
 await addWizDoc(f,type);
 e.target.value='';
}
function onWizDocDrop(e){
 const f=e.dataTransfer.files[0];if(!f)return;
 const type=$('#wizDocType').value;addWizDoc(f,type);
}
async function addWizDoc(file,type){
 const c=state.ui.wizard.client;
 const meta=await storeDocument(file,c.id,type,'Captured via wizard step 9');
 c.kyc.documentsHeld=c.kyc.documentsHeld||[];c.kyc.documentsHeld.push(meta);
 renderWizard();
 toast('Document added · sha256: '+meta.sha256.slice(0,12)+'…');
}
async function removeWizDoc(id){
 const c=state.ui.wizard.client;
 const idx=c.kyc.documentsHeld.findIndex(d=>d.blobRef===id);if(idx<0)return;
 await deleteDocument(id);c.kyc.documentsHeld.splice(idx,1);
 renderWizard();toast('Document removed');
}
async function commitWizard(){
 const w=state.ui.wizard;if(!w)return;const c=w.client;
 c.app=c.app||{};c.app.onboardCompleted=true;
 const dates=computeReviewDates(c);c.kyc.lastReviewAt=dates.lastReviewAt;c.kyc.nextReviewDue=dates.nextReviewDue;
 const riskInfo=suggestRiskGrade(c);c.kyc.riskGrade=riskInfo.grade;
 if(c.kyc.status==='pending')c.kyc.status='verified';
 await saveClient(c,'client.created','Onboarding committed via 10-step wizard');
 // also fire on fall-client cross-bundle mesh
 try{const bc=new BroadcastChannel('fall-client');bc.postMessage({v:1,type:'client.created',source:TOOLNAME,ts:now(),payload:c});bc.close()}catch(e){}
 state.ui.wizard=null;
 closeModal();render();toast('Client onboarded · risk: '+riskInfo.grade);
}

 {k:['pep','politically exposed'],a:'**PEP definition (MLR 2017 reg.35(12)).** A natural person entrusted with prominent public functions — heads of state, government ministers, judges, MPs, senior military, central bank board, ambassadors, senior managers of state-owned enterprises. Plus family members + close associates. EDD required: senior management approval, source of wealth, enhanced ongoing monitoring.'},
 {k:['sanctions','ofsi','consolidated list'],a:'**Sanctions screen.** Mandatory pre-bind: (1) UK Sanctions List (gov.uk), (2) OFSI Consolidated List, (3) EU list (for legacy + EU exposures), (4) OFAC if any US nexus. Match = STOP, escalate to MLRO, do not bind, file SAR if appropriate. Re-screen on: renewal, MTA, named-driver add, relationship change.'},
 {k:['vulnerable','fg21','fg 21/1','vulnerability'],a:'**Vulnerable customer · FCA FG21/1.** Four drivers: (1) **health** — physical/mental/cognitive conditions, (2) **life events** — bereavement, divorce, job loss, (3) **resilience** — low income, debt, no savings, (4) **capability** — language, literacy, digital. Document the type (permanent/temporary/situational) + adjustments made (longer time, alternative comms, third-party support). Consumer Duty (PRIN 12) makes this an outcome-tested obligation, not a box-tick.'},
 {k:['icobs','conduct of business'],a:'**ICOBS** = Insurance: Conduct of Business sourcebook. Key sections for brokers: ICOBS 2 (general principles), ICOBS 4 (info about firm + capacity), ICOBS 5 (identify demands & needs + suitability statement for advised sales), ICOBS 6 (info about policy), ICOBS 7 (cancellation rights), ICOBS 8 (claims handling). Reduced ICOBS regime for commercial customers; mostly disapplied for large risks.'},
 {k:['pi minimum','pii minimum','minimum cover','professional indemnity'],a:'**PI minimum (FCA IPRU-INV 13.1).** Insurance distribution firms — Article 10(4) IDD minimum: **€1,300,380 each claim** and **€1,924,560 aggregate**. FCA uplifts in GBP — current floor £1.5M each / £3M aggregate is a safe target. Mortgage/IFA brokers have separate thresholds. Track expiry in the Firm tab; renewal lapse = activity must cease.'},
 {k:['cdd directors','beneficial owners','psc','25%','beneficial ownership'],a:'**Beneficial owners (commercial CDD).** MLR 2017 reg.5(1)(b) + reg.28(4): identify any natural person owning **>25%** (shares/voting rights) or otherwise exercising control. Reg.28(8): take reasonable measures to verify. Capture: name, DOB, nationality, % held, role. Cross-check against Companies House PSC register + capture an extract in step 9. PEP-screen each BO.'},
 {k:['idd article 20','article 20','d&n'],a:'**IDD Article 20** is the operational anchor: distribute only products consistent with client demands & needs. Captured in wizard step 5 + persisted on the client record. Sibling tool `fallinsurancepaper` (prime 853) renders the formal Demands & Needs Statement that goes out alongside the policy.'},
 {k:['idd article 17','article 17','non-advisory','execution-only'],a:'**IDD Article 17 advisory vs non-advisory.** Three modes: (a) *advisory* — broker recommends a specific product; (b) *non-advisory* — broker presents options without recommendation; (c) *execution-only* — client chooses, broker just transacts. Each carries different obligations under ICOBS 5 + 6. Captured per-client in the D&N step.'},
 {k:['pog','product oversight','product governance','idd pog'],a:'**IDD Product Oversight & Governance (POG).** Article 25 + FCA PROD 4: manufacturers + distributors must operate POG arrangements — identify target market, test product, review periodically. Brokers acting as co-manufacturers (rare) take on full POG. Distribution-only brokers must understand the target market and not distribute outside it.'},
];
function answerT0(q){
 const ql=q.toLowerCase();
 for(const r of T0_RULES){
 if(r.k.some(k=>ql.includes(k.toLowerCase())))return{src:'T0 · IDD rules',answer:r.a};
 }
 return null;
}
async function askT3(q){
 const keys=state.settings;
 const ctx=`You are an FCA + IDD compliance assistant for a UK insurance broker. Be precise + cite specific FCA / MLR / JMLSG sections where relevant. Current client context: ${state.ui.activeClient?JSON.stringify(state.clients.find(c=>c.id===state.ui.activeClient)?.kyc||{}).slice(0,500):'(no active client)'}`;
 const messages=[{role:'system',content:ctx},{role:'user',content:q}];
 // anthropic
 if(keys.anthropicKey){
 try{
 const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','anthropic-version':'2023-06-01','x-api-key':keys.anthropicKey,'anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,system:ctx,messages:[{role:'user',content:q}]})});
 const j=await r.json();if(j.content?.[0]?.text)return{src:'T3 · Anthropic',answer:j.content[0].text};
 }catch(e){console.warn(e)}
 }
 if(keys.openaiKey){
 try{const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+keys.openaiKey},body:JSON.stringify({model:'gpt-4o-mini',messages,max_tokens:1024})});const j=await r.json();if(j.choices?.[0]?.message?.content)return{src:'T3 · OpenAI',answer:j.choices[0].message.content}}catch(e){}
 }
 if(keys.geminiKey){
 try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${keys.geminiKey}`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:ctx+'\n\n'+q}]}]})});const j=await r.json();const t=j.candidates?.[0]?.content?.parts?.[0]?.text;if(t)return{src:'T3 · Gemini',answer:t}}catch(e){}
 }
 if(keys.openrouterKey){
 try{const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+keys.openrouterKey},body:JSON.stringify({model:'meta-llama/llama-3.1-8b-instruct',messages,max_tokens:1024})});const j=await r.json();if(j.choices?.[0]?.message?.content)return{src:'T3 · OpenRouter',answer:j.choices[0].message.content}}catch(e){}
 }
 return{src:'offline',answer:'No T0 rule matched and no T3 BYOK key configured. Add a key in Settings (gear icon) for free-form Q&A. T0 covers: category / demands & needs / CDD trigger / PEP / sanctions / vulnerable / ICOBS / PI min / beneficial owners / IDD Art 17, 20, POG.'};
}
function renderQA(){
 return `${DISCLAIMER}
 <div class="section-h"><div><h2>IDD Help · Q&amp;A</h2><div class="sub">T0 offline router · 12 rules · T3 BYOK fallback for nuanced questions</div></div></div>
 <div class="card">
 <div class="chat" id="chatBox">${state.chat.length?state.chat.map(m=>`<div class="msg ${m.role}">${esc(m.content).replace(/\\n/g,'<br>')}${m.src?`<div class="src">${esc(m.src)}</div>`:''}</div>`).join(''):'<div class="msg bot">Ask anything about IDD / CDD / ICOBS / PEP / sanctions / vulnerable customers / PI requirements. T0 answers are deterministic + cite FCA/MLR/JMLSG sections.<div class="src">T0 ready · 12 rules indexed</div></div>'}</div>
 <form class="chat-input" onsubmit="event.preventDefault();askQA(this)"><input name="q" placeholder="e.g. when does AML CDD trigger?" required><button class="btn primary" type="submit">ask</button></form>
 </div>`;
}
async function askQA(formEl){
 const q=formEl.q.value.trim();if(!q)return;
 state.chat.push({role:'user',content:q});formEl.q.value='';render();
 const t0=answerT0(q);
 if(t0){state.chat.push({role:'bot',content:t0.answer,src:t0.src});persistState();render();return}
 const t3=await askT3(q);
 state.chat.push({role:'bot',content:t3.answer,src:t3.src});
 persistState();render();
}

function exportAll(){
 const blob=new Blob([JSON.stringify({tool:TOOLNAME,version:VERSION,exportedAt:now(),state,audit:state.audit},null,2)],{type:'application/json'});
 const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=`${TOOLNAME}-export-${fmtDateISO(now())}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);
 toast('Exported');
}
function importAll(){
 const inp=document.createElement('input');inp.type='file';inp.accept='application/json';
 inp.onchange=async e=>{
 const f=e.target.files[0];if(!f)return;
 try{
 const data=JSON.parse(await f.text());
 if(data.tool!==TOOLNAME&&!confirm('File is from a different tool — import anyway?'))return;
 if(data.state){Object.assign(state,data.state);await persistState()}
 if(data.audit){for(const e of data.audit){await idbPut('audit',e)}state.audit=await idbAll('audit');state.audit.sort((a,b)=>a.i-b.i)}
 toast('Imported');render();
 }catch(e){toast('Import failed: '+e.message)}
 };inp.click();
}
async function wipeAll(){
 if(!confirm('Wipe ALL device state? clients, advisers, firm, documents, audit — gone. Type-confirm by clicking OK on the next prompt.'))return;
 if(prompt('Type WIPE to confirm:')!=='WIPE')return;
 await idbClear('state');await idbClear('audit');await idbClear('documents');
 localStorage.removeItem(STORE+'.state');location.reload();
}
function exportAudit(){
 const blob=new Blob([JSON.stringify(state.audit,null,2)],{type:'application/json'});
 const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=`${TOOLNAME}-audit-${fmtDateISO(now())}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);toast('Audit exported');
}
async function verifyAudit(){
 let prev='';let broken=0;
 for(const e of state.audit){
 if(e.prevHash!==prev){broken++;continue}
 const recomputed=await sha256(JSON.stringify({prevHash:e.prevHash,ts:e.ts,action:e.action,clientId:e.clientId,payload:e.payload}));
 if(recomputed!==e.docHash){broken++;continue}
 prev=e.docHash;
 }
 toast(broken===0?`Chain intact · ${state.audit.length} entries verified`:`Chain broken · ${broken} bad entries`);
}
